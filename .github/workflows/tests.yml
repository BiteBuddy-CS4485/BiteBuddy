name: Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared package
        run: npm -w @bitebuddy/shared run typecheck

      - name: Test shared package
        run: npm -w @bitebuddy/shared run test

      - name: Test API package
        run: npm -w @bitebuddy/api run test

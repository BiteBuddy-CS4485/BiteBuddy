name: API Contract Auto-Update

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  regenerate-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate API contract
        run: npm run api:contract:generate

      - name: Commit updated contract if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/api-contract/openapi.json apps/api/public/openapi.json; then
            echo "No API contract changes to commit."
            exit 0
          fi
          git add docs/api-contract/openapi.json apps/api/public/openapi.json
          git commit -m "chore(contract): auto-update OpenAPI artifacts"
          git push
